<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>静态原型 - 挂号预约</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">挂号预约（静态原型）</div>
      <div class="nav">
        <a href="index.html">首页</a>
        <a href="appointments.html">挂号预约</a>
        <a href="triage.html">AI分诊</a>
        <a href="login.html">退出</a>
      </div>
    </div>

    <div class="card">
      <h3>预约表单</h3>
      <div class="row3">
        <div>
          <label>科室</label>
          <select>
            <option>中医内科</option>
            <option>针灸推拿科</option>
            <option>中医妇科</option>
            <option>中医儿科</option>
          </select>
        </div>
        <div>
          <label>医生</label>
          <select>
            <option>张仲景</option>
            <option>李时珍</option>
            <option>华佗</option>
          </select>
        </div>
        <div>
          <label>日期</label>
          <input type="date" />
        </div>
      </div>
      <div class="card">
        <label>症状描述</label>
        <textarea rows="3" placeholder="请输入症状描述"></textarea>
      </div>
      <button onclick="alert('静态原型：预约提交成功（演示）')">提交预约（演示）</button>
    </div>

    <div class="card">
      <h3>我的预约（示例）</h3>
      <table>
        <thead>
          <tr><th>日期</th><th>科室</th><th>医生</th><th>状态</th></tr>
        </thead>
        <tbody>
          <tr><td>2026-04-13</td><td>中医内科</td><td>张仲景</td><td><span class="tag">已预约</span></td></tr>
          <tr><td>2026-04-15</td><td>针灸推拿科</td><td>李时珍</td><td><span class="tag">待就诊</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="./assets/app.js"></script>
</body>
</html>
