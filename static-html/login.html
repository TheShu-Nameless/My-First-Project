<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>静态原型 - 登录</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="login card">
    <h2>门诊预约与智能分诊系统</h2>
    <p class="muted">静态 HTML 原型页面（演示用，不连接后端）</p>
    <form id="loginForm">
      <div class="card">
        <label>账号</label>
        <input value="TheShu" />
      </div>
      <div class="card">
        <label>密码</label>
        <input type="password" placeholder="请输入密码" />
      </div>
      <button type="submit">登录（演示跳转）</button>
    </form>
    <p class="muted" style="margin-top: 12px;">提交后将跳转到首页静态原型。</p>
  </div>
  <script src="./assets/app.js"></script>
</body>
</html>
